mcp_servers:
  filesystem:
    command: npx
    args: ["-y", "@modelcontextprotocol/server-filesystem", "."]
    description: "Read source code files and write data/output artifacts"

  github:
    command: npx
    args: ["-y", "gh-cli-mcp"]
    env:
      GH_TOKEN: "${GH_TOKEN}"
    description: "GitHub operations — create docs branch, open PR for doc updates"

  sequential-thinking:
    command: npx
    args: ["-y", "@modelcontextprotocol/server-sequential-thinking"]
    description: "Structured reasoning for complex schema inference and quality review"
